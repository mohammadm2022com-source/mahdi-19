<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>پاکت سه‌بعدی | نامه عاشقانه</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- لینک به فایل استایل -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <!-- Floating rose petals -->
  <div class="petals-container" id="petalsContainer"></div>

  <!-- Light particles -->
  <div class="particles-container" id="particlesContainer"></div>

  <!-- Candles -->
  <div class="candles-container" id="candlesContainer">
    <div class="candle"><div class="flame"></div><div class="candle-body"></div></div>
    <div class="candle"><div class="flame"></div><div class="candle-body"></div></div>
    <div class="candle"><div class="flame"></div><div class="candle-body"></div></div>
  </div>

  <!-- MUSIC CONTROL -->
  <div class="music-control" id="musicToggle">
    <i class="fas fa-music" id="musicIcon"></i>
    <span>موسیقی</span>
  </div>

  <!-- MAIN ENVELOPE 3D -->
  <div class="envelope-wrapper">
    <div class="envelope-3d" id="envelope3d">
      <!-- front face -->
      <div class="envelope-face envelope-front" id="envelopeFront">
        <div style="position:absolute; bottom:18%; left:50%; transform:translateX(-50%); width:40px; height:40px; background:#9f7a4a; border-radius:50%; box-shadow: inset -2px -2px 8px #4d3518, 0 0 20px #c8a074; border: 1px solid #c8a074;"></div>
      </div>
      <!-- back face -->
      <div class="envelope-face envelope-back"></div>
      <!-- letter content inside -->
      <div class="letter-content" id="letterContent">
        <div style="font-weight:600; font-size:1rem; color:#4f351a; border-bottom:1px solid #b38b5a; padding-bottom:6px; margin-bottom:8px; display:flex; justify-content:space-between;">
          <span>✉️ نامه</span>
          <span style="font-size:0.7rem; opacity:0.7;">پاراگراف به پاراگراف</span>
        </div>
        <div class="typing-area" id="typingArea">
          <span id="typeDisplay"></span><span class="type-cursor" id="typeCursor"></span>
        </div>
        <button class="close-letter-btn" id="closeLetterBtn"><i class="fas fa-envelope"></i> بستن نامه</button>
      </div>
    </div>
  </div>

  <!-- لینک به فایل اسکریپت -->
  <script src="script.js"></script>
</body>
</html>
