<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>نامه عاشقانه</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <audio id="openSound">
        <source src="open.mp3" type="audio/mpeg">
    </audio>

    <audio id="closeSound">
        <source src="close.mp3" type="audio/mpeg">
    </audio>

    <div id="stars"></div>

    <div id="particles"></div>

    <div id="petals"></div>

    <button id="musicBtn">

        🔇

    </button>

    <div class="candle left">

        <div class="flame"></div>

    </div>

    <div class="candle right">

        <div class="flame"></div>

    </div>

    <div class="scene">

        <div class="envelope" id="envelope">

            <div class="shadow"></div>

            <div class="back"></div>

            <div class="letter">

                <div class="paper">

                    <div class="paper-top"></div>

                    <div class="paper-body">

                        <h1>

                            تولدت مبارک ❤️

                        </h1>

                        <div id="typing">

                        </div>

                        <button id="closeLetter">

                            بستن نامه

                        </button>

                    </div>

                </div>

            </div>

            <div class="front">

                <div class="title">

                    <div class="icon">

                        ✉

                    </div>

                    <span>

                        برای مهدی

                    </span>

                    <small>

                        لمس کن

                    </small>

                </div>

            </div>

            <div class="flap">

            </div>

        </div>

    </div>

    <template id="paragraphs">

        <p>

            سلام...

        </p>

        <p>

            امروز فقط یک روز معمولی نیست...

        </p>

        <p>

            امروز روزیه که خدا یکی از بهترین آدم‌های دنیا رو آفرید.

        </p>

        <p>

            امیدوارم همیشه سالم باشی...

        </p>

        <p>

            همیشه بخندی...

        </p>

        <p>

            همیشه موفق باشی...

        </p>

        <p>

            و هر آرزویی که داری...

        </p>

        <p>

            بهش برسی...

        </p>

        <p>

            تولدت هزاران بار مبارک ❤️

        </p>

    </template>

    <script src="script.js"></script>

</body>

</html>
